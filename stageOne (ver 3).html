<!DOCTYPE html>
<html id="levelOne">
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
    <!-- FONT STUFF -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js" integrity="sha512-4P0ZJ49OMXe3jXT+EsEaq82eNwFeyYL81LeHGzGcEhowFbTqeQ80q+NEkgsE8tHPs6aCqvi7U+XWliAjDmT5Lg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- p5.js COLLISION -->
    <script defer src="https://unpkg.com/p5.collide2d"></script>
    <!-- THE P5 GAME STUFF -->
    <script>
      //Window dimension variables
      let w = window.outerWidth;
      let h = window.outerHeight;

      //Player variables
      let playerX = w / 2; //Player x-coordinate
      let playerY = h - 10; //Player y-coordinate
      let playerW = 25; //Player width
      let playerH = 25; //Player height
      let playerSpeed = 7.5; //The speed of the player when moving


      //Platform variables
      let platformW = 75; //Platform width
      let platformH = 50; //Platform height
      let platformX1 = w / 2; //Platform 1 x-coordinate
      let platformY1 = h - 100; //Platform 1 y-coordinate
      let platformX2 = w * 0.25; //Platform 2 x-coordinate
      let platformY2 = h - 75; //Platform 2 y-coordinate

      //Obstacle variables
      let obstacleW = 100;
      let obstacleH = 100;
      let obstacleX1 = 0;
      let obstacleY1 = 0;

      //Hit variables
      let hit1 = false;
      let hit2 = false;

      //Setup Function
      function setup() {
          createCanvas(w,h); //Create a canvas
      };

      //Draw function
      function draw() {
        clear(); //Clear the canvas
        playerMovement(); //Player movement function
        obstacleMovement();

        //Player
        stroke(0);
        fill('purple');
        rect(playerX,playerY,playerW,playerH);

        //Platform 1
        stroke(0);
        fill('blue');
        rect(platformX1,platformY1,platformW,platformH);

        //Obstacle 1
        stroke(0);
        fill('red');
        rect(obstacleX1,obstacleY1,obstacleW,obstacleH);

        //Reset the obstacles
        if (obstacleY1 > h) {
            obstacleY1 = 100;
            obstacleX1 = Math.floor(Math.random() * w);
        }

        //Collision
        rectMode(CORNER);
        hit1 = collideRectRect(
            playerX,
            playerY,
            25,
            25,
            platformX1,
            platformY1,
            platformW,
            platformH
        )
            if (hit1 == true) {
                playerSpeed = 0;
                //Moving left
                if (keyIsDown(65) || keyIsDown(37)) {
                    playerX = playerX + 0;
                }
                else if (keyIsDown(68) || keyIsDown(39)) {
                    playerX = playerX - 0;
                }
                else if (keyIsDown(87) || keyIsDown(38)) {
                    playerY = playerY + 0;
                }
                else if (keyIsDown(83) || keyIsDown(40)) {
                    playerY = playerY - 0;
                }
                else {
                    playerSpeed = 7.5;
                }
            }
            else {
                playerSpeed = 7.5;
            }
      };

      function playerMovement() {
          //A key and Left Arrow key
          if (keyIsDown(65) || keyIsDown(37)) {
              playerX = playerX - playerSpeed;
          }
          //D key and Right Arrow key
          if (keyIsDown(68) || keyIsDown(39)) {
              playerX = playerX + playerSpeed;
          }
          //W key and Up Arrow key
          if (keyIsDown(87) || keyIsDown(38)) {
              playerY = playerY - playerSpeed;
          }
          //S key and Down Arrow key
          if (keyIsDown(83) || keyIsDown(40)) {
              playerY = playerY + playerSpeed;
          }
      };
      
      function obstacleMovement() {
          obstacleY1 += 20;
          fill('red');
          rect(obstacleX1,obstacleY1,obstacleW,obstacleH);
      };
    </script>
  </head>
  <body>
  </body>
</html>
