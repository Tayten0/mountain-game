<!DOCTYPE html>
<html id="levelOne">
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="script.js"></script>
    <!-- FONT STUFF -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js" integrity="sha512-4P0ZJ49OMXe3jXT+EsEaq82eNwFeyYL81LeHGzGcEhowFbTqeQ80q+NEkgsE8tHPs6aCqvi7U+XWliAjDmT5Lg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- p5.js COLLISION -->
    <script defer src="https://unpkg.com/p5.collide2d"></script>
    <!-- THE P5 GAME STUFF -->
    <script>
      //Window dimension variables
      let w = window.outerWidth;
      let h = window.outerHeight;

      //Player variables
      let playerX = 50; //Player x-coordinate
      let playerY = 50; //Player y-coordinate
      let playerW = 75; //Player width
      let playerH = 75; //Player height
      let playerWalkingSpeed = 10; //The speed of the player when moving
      let playerJump = false; //Detects if the player is jumping or not
      let playerGravity = 1; //The force of gravity in the game
      let playerVelocity = 7.5; //The speed of the player when jumping
      let playerJumpPower = 17.5; //The energy/strength of the player's jump
      let fallingSpeed = 7.5; //Equal to playerVelocity
      let minimumHeight = h - 50; //The lowest point on the screen the player is allowed to reach
      let maximumHeight = 25; // The highest point on the screen the player is allowed to reach
      let jumpCounter = 0; //How many times has the player jumped


      //Platform variables
      let platformX1 = w / 2; //Platform 1 x-coordinate
      let platformY1 = h - 50; //Platform 1 y-coordinate
      let platformX2 = w * 0.25;
      let platformY2 = h - 75;
      let platformW = 150; //Platform width
      let platformH = 100; //Platform height

      //Hit variables
      let hit1 = false;
      let hit2 = false;

      //Setup Function
      function setup() {
          createCanvas(w,h);
          rectMode(CENTER);
      };

      //Draw function
      function draw() {
        clear(); //Clear the canvas
        playerMovement(); //Call the player movement function
        jump(); //Call the player jump function
        gravity(); // Call the player gravity function

        //Create the player
        stroke(0);
        fill('red');
        rect(playerX,playerY,playerW,playerH);

        //Create the platforms
        stroke(0);
        fill('blue');
        rect(platformX1,platformY1,platformW,platformH); //Platform 1

        stroke(0);
        fill('purple');
        rect(platformX2,platformY2,platformW,platformH); //Platform 2

        //Collisions
        /*if (playerX >= platformX1-platformW/2 && playerX <= platformX1+platformW/2 && playerY+1+playerH/2 >= platformY1-platformH/2 && playerY+1+playerH/2 <= platformY1+platformH/2 && playerJump == false) {
          playerY = playerY; //Don't fall / Stop falling
          playerVelocity = 0;
          jumpCounter = 0; //Lets the player jump off the platform
        }*/

        hit1 = collideRectRect(
          playerX,
          playerY,
          75,
          75,
          platformX1,
          platformY1,
          platformW,
          platformH);
          if (hit1 == true) {
            playerY = playerY; //Don't fall
            playerVelocity = 0;
            jumpCounter = 0;
          };
          
          hit2 = collideRectRect(
          playerX,
          playerY,
          75,
          75,
          platformX2,
          platformY2,
          platformW,
          platformH);
          if (hit2 == true) {
            playerY = playerY; //Don't fall
            playerVelocity = 0;
            jumpCounter = 0;
          }
      };

      //Function that allows the player to move
      function playerMovement() {
        //A key and Left Arrow key
        if (keyIsDown(65) || keyIsDown(37)) {
          playerX = playerX - playerWalkingSpeed;
        }
        //D key and Right Arrow key
        if (keyIsDown(68) || keyIsDown(39)) {
          playerX = playerX + playerWalkingSpeed;
        }
      }
      
      //Function that allows the player to jump
      function jump() {
        //W key, Up Arrow key, Spacebar
        if (keyIsDown(87) || keyIsDown(38) || keyIsDown(32)) {
          //Set player jump variable to true
          playerJump = true;
          console.log(playerJump);
        }
        else {
          //Set player jump variable to false
          playerJump = false;
          console.log(playerJump);
        }
      };

      //Function that manages player gravity
      function gravity() {
        if (playerY >= minimumHeight && playerJump == false) { //If the player reaches the death barrier and they're not jumping
          playerY = playerY; //Stop them from falling
          jumpCounter = 0; //Reset the jump counter
          console.log('On the floor')
        }
        else {
          playerY = playerY + (playerGravity*playerVelocity); //Changes player y-coordinate based on player's gravity and velocity
        }

        if (playerJump == true) { //If the player jump variable is set to true
          if (playerY <= maximumHeight || jumpCounter >= playerJumpPower) { //If the player is at the top of the screen OR if the player is spamming the jump button
            if (playerY >= minimumHeight) { //If the player is greater than or equal to the bottom barrier
              playerY = minimumHeight;
              jumpCounter = 0;
              console.log('Through the floor');
            }
            else {
              playerVelocity = fallingSpeed; //Keep the player's velocity the same
            }
          }
          else {
            playerVelocity = -playerJumpPower; //Decrease the player's velocity by their jump power, making it a negative
            jumpCounter = jumpCounter + 1; //Add to the jump counter
            console.log('youre jumping ' + jumpCounter)
          }
        }
        else {
          playerVelocity = fallingSpeed;
        }
      };
    </script>
  </head>
  <body>
  </body>
</html>
